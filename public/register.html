<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskWeb – Registro</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <h1>TaskWeb</h1>
    <p class="subtitle">Crea tu cuenta gratis</p>

    <div class="error-msg" id="errorMsg"></div>
    <div class="success-msg" id="successMsg"></div>

    <div class="form-group">
      <label>Nombre completo</label>
      <input type="text" id="nombre" placeholder="Tu nombre">
    </div>
    <div class="form-group">
      <label>Correo electrónico</label>
      <input type="email" id="correo" placeholder="tu@correo.com">
    </div>
    <div class="form-group">
      <label>Contraseña</label>
      <input type="password" id="contrasena" placeholder="Mínimo 8 caracteres">
    </div>
    <button class="btn" onclick="register()">Crear cuenta</button>

    <div class="link-text">
      ¿Ya tienes cuenta? <a href="index.html">Inicia sesión</a>
    </div>
  </div>
  <script src="js/auth.js"></script>
</body>
</html>
