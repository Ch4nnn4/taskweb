<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskWeb – Iniciar Sesión</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <h1>TaskWeb</h1>
    <p class="subtitle">Inicia sesión para ver tus tareas</p>

    <div class="error-msg" id="errorMsg"></div>

    <div class="form-group">
      <label>Correo electrónico</label>
      <input type="email" id="correo" placeholder="tu@correo.com">
    </div>
    <div class="form-group">
      <label>Contraseña</label>
      <input type="password" id="contrasena" placeholder="Tu contraseña">
    </div>
    <button class="btn" onclick="login()">Iniciar sesión</button>

    <div class="link-text">
      ¿No tienes cuenta? <a href="register.html">Regístrate aquí</a>
    </div>
  </div>
  <script src="js/auth.js"></script>
</body>
</html>
