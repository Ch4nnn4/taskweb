<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskWeb – Panel Admin</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .admin-container {
      max-width: 900px;
      margin: 30px auto;
      padding: 0 16px;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.07);
      text-align: center;
    }
    .stat-card .number {
      font-size: 32px;
      font-weight: 700;
      color: #4f46e5;
    }
    .stat-card .label {
      font-size: 13px;
      color: #888;
      margin-top: 4px;
    }
    .admin-table {
      background: white;
      border-radius: 12px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.07);
      overflow: hidden;
    }
    .admin-table h3 {
      padding: 20px;
      font-size: 16px;
      color: #4f46e5;
      border-bottom: 1px solid #f0f0f0;
      margin: 0;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    thead {
      background: #f9fafb;
    }
    th {
      padding: 12px 16px;
      text-align: left;
      font-size: 12px;
      font-weight: 600;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    td {
      padding: 14px 16px;
      font-size: 13px;
      border-bottom: 1px solid #f0f0f0;
      color: #333;
    }
    tr:last-child td {
      border-bottom: none;
    }
    tr:hover td {
      background: #f9fafb;
    }
    .badge-aprobada {
      background: #dcfce7;
      color: #16a34a;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge-pendiente {
      background: #fef9c3;
      color: #ca8a04;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }
    .btn-approve {
      background: #22c55e;
      color: white;
      border: none;
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
    }
    .btn-approve:hover { background: #16a34a; }
    .btn-disapprove {
      background: #f59e0b;
      color: white;
      border: none;
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
    }
    .btn-disapprove:hover { background: #d97706; }
    .filter-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    .filter-bar select {
      padding: 8px 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 13px;
      background: white;
    }
    .empty-msg {
      text-align: center;
      padding: 40px;
      color: #888;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <div class="navbar">
    <h2>TaskWeb – Panel Admin</h2>
    <div style="display:flex; align-items:center; gap:16px;">
      <span id="nombreAdmin"></span>
      <button onclick="logout()">Cerrar sesión</button>
    </div>
  </div>

  <div class="admin-container">

    <!-- Stats -->
    <div class="stats">
      <div class="stat-card">
        <div class="number" id="totalTareas">0</div>
        <div class="label">Total de tareas</div>
      </div>
      <div class="stat-card">
        <div class="number" id="totalAprobadas" style="color:#22c55e">0</div>
        <div class="label">Aprobadas</div>
      </div>
      <div class="stat-card">
        <div class="number" id="totalPendientes" style="color:#f59e0b">0</div>
        <div class="label">Pendientes de aprobación</div>
      </div>
    </div>

    <!-- Filtros -->
    <div class="filter-bar">
      <select id="filtroEstado" onchange="filtrarTareas()">
        <option value="todas">Todas las tareas</option>
        <option value="pendientes">Pendientes de aprobación</option>
        <option value="aprobadas">Aprobadas</option>
      </select>
      <select id="filtroPrioridad" onchange="filtrarTareas()">
        <option value="todas">Todas las prioridades</option>
        <option value="alta">Alta</option>
        <option value="media">Media</option>
        <option value="baja">Baja</option>
      </select>
    </div>

    <!-- Tabla -->
    <div class="admin-table">
      <h3>Tareas de todos los usuarios</h3>
      <table>
        <thead>
          <tr>
            <th>Usuario</th>
            <th>Tarea</th>
            <th>Prioridad</th>
            <th>Fecha límite</th>
            <th>Estado</th>
            <th>Aprobación</th>
            <th>Acción</th>
          </tr>
        </thead>
        <tbody id="tablaTareas"></tbody>
      </table>
    </div>

  </div>

  <script>
    const API = 'https://taskweb-re40.onrender.com/api';
    const token = localStorage.getItem('token');
    const usuario = JSON.parse(localStorage.getItem('usuario'));

    if (!token || usuario?.rol !== 'admin') {
      window.location.href = 'index.html';
    }

    document.getElementById('nombreAdmin').textContent = usuario?.nombre || '';

    let todasLasTareas = [];

    async function loadAllTasks() {
      try {
        const res = await fetch(`${API}/admin/tasks`, {
          headers: { authorization: token }
        });
        todasLasTareas = await res.json();
        actualizarStats();
        filtrarTareas();
      } catch (err) {
        console.error('Error cargando tareas:', err);
      }
    }

    function actualizarStats() {
      const aprobadas = todasLasTareas.filter(t => t.aprobada).length;
      document.getElementById('totalTareas').textContent = todasLasTareas.length;
      document.getElementById('totalAprobadas').textContent = aprobadas;
      document.getElementById('totalPendientes').textContent = todasLasTareas.length - aprobadas;
    }

    function filtrarTareas() {
      const estado = document.getElementById('filtroEstado').value;
      const prioridad = document.getElementById('filtroPrioridad').value;

      let filtradas = todasLasTareas;

      if (estado === 'pendientes') filtradas = filtradas.filter(t => !t.aprobada);
      if (estado === 'aprobadas') filtradas = filtradas.filter(t => t.aprobada);
      if (prioridad !== 'todas') filtradas = filtradas.filter(t => t.prioridad === prioridad);

      renderTabla(filtradas);
    }

    function renderTabla(tareas) {
      const tbody = document.getElementById('tablaTareas');

      if (tareas.length === 0) {
        tbody.innerHTML = `<tr><td colspan="7" class="empty-msg">No hay tareas para mostrar</td></tr>`;
        return;
      }

      tbody.innerHTML = tareas.map(t => `
        <tr>
          <td>
            <strong>${t.nombre_usuario}</strong><br>
            <span style="color:#888;font-size:11px">${t.correo}</span>
          </td>
          <td>
            <strong>${t.titulo}</strong><br>
            <span style="color:#888">${t.descripcion || ''}</span>
          </td>
          <td><span class="badge badge-${t.prioridad}">${t.prioridad}</span></td>
          <td>${t.fecha_limite ? t.fecha_limite.split('T')[0] : '—'}</td>
          <td>${t.completada ? '<span style="color:#22c55e">✓ Completada</span>' : '<span style="color:#888">Pendiente</span>'}</td>
          <td>${t.aprobada
            ? '<span class="badge-aprobada">✓ Aprobada</span>'
            : '<span class="badge-pendiente">⏳ Pendiente</span>'
          }</td>
          <td>
            ${!t.aprobada
              ? `<button class="btn-approve" onclick="approveTask(${t.id}, 1)">Aprobar</button>`
              : `<button class="btn-disapprove" onclick="approveTask(${t.id}, 0)">Desaprobar</button>`
            }
          </td>
        </tr>
      `).join('');
    }

    async function approveTask(id, aprobada) {
      await fetch(`${API}/admin/tasks/${id}/approve`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', authorization: token },
        body: JSON.stringify({ aprobada })
      });
      loadAllTasks();
    }

    function logout() {
      localStorage.removeItem('token');
      localStorage.removeItem('usuario');
      window.location.href = 'index.html';
    }

    loadAllTasks();
  </script>

</body>
</html>
